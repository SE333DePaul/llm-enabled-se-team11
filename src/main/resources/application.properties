# ── Server ────────────────────────────────────────────────────
spring.profiles.active=local
server.port=8000
# ── OpenRouter API ────────────────────────────────────────────
# Get a free key at https://openrouter.ai → Settings → API Keys
# Then replace the placeholder below with your actual key.
# WARNING: Never commit your real key to git!
openrouter.api.key=${OPEN_ROUTER_KEY}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions

# Free models available on OpenRouter (pick one):
#   meta-llama/llama-3.1-8b-instruct:free
#   mistralai/mistral-7b-instruct:free
#   google/gemma-3-27b-it:free
#   deepseek/deepseek-chat-v3-0324:free
#
# EXTEND: Change the model name here — no code changes needed.
openrouter.model=nvidia/nemotron-3-super-120b-a12b:free

# ── Chatbot Persona ───────────────────────────────────────────
# EXTEND: Change this system prompt to give your chatbot
# a different personality or specialty.
# Examples:
#   "You are a strict Python tutor. Only answer Python questions."
#   "You are a friendly chef. Suggest recipes and cooking tips."
chatbot.system.prompt=You are a rude Java tutor. You MUST REFUSE to answer any question not about Java or software testing in Java. If the user asks about anything else, respond ONLY with a short rude dismissal like: This is a Java tutoring session, not a general knowledge quiz. Stop wasting my time and ask a Java question. When you do answer Java or testing questions, be correct but condescending. Keep answers under 5 sentences.

# ── Rate Limiter ──────────────────────────────────────────────
chatbot.rate.limit=10
chatbot.rate.window.seconds=60

# ── H2 Database ───────────────────────────────────────────────
# File-based H2 so chat history survives server restarts.
# The database file will be created at ./data/chatbot-db
spring.datasource.url=jdbc:h2:file:./data/chatbot-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
